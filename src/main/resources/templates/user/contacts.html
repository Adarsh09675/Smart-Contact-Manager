<!DOCTYPE html>
<html
  lang="en"
  th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title>All Your Contacts</title>
  </head>

  <body>
    <div id="content">

      <!-- Sidebar -->
      <div th:if="${loggedInUser}">
        <div th:replace="~{user/sidebar :: sidebar}"></div>
      </div>

      <div class="sm:pl-64 pt-20 px-6">

        <h1 class="text-4xl text-center mb-2">All Your Contacts</h1>
        <p class="text-center mb-6 text-gray-500">
          Manage your saved contacts
        </p>

        <!-- Search + Export -->
        <div class="flex flex-wrap items-center justify-between bg-white dark:bg-gray-900 px-6 py-4 rounded shadow">

          <form
            th:object="${contactSearchForm}"
            th:action="@{/user/contacts/search}"
            method="post"
            class="flex flex-wrap items-center gap-3"
          >
            <select
              th:field="*{field}"
              class="border rounded px-3 py-2"
              required
            >
              <option value="">Select Field</option>
              <option value="name">Name</option>
              <option value="phone">Phone</option>
              <option value="email">Email</option>
            </select>

            <input
              th:field="*{value}"
              type="text"
              placeholder="Search..."
              class="border rounded px-3 py-2"
              required
            />

            <button
              type="submit"
              class="bg-gray-800 text-white px-4 py-2 rounded"
            >
              Search
            </button>
          </form>

          <button
            onclick="exportData()"
            class="bg-green-700 text-white px-4 py-2 rounded"
          >
            Export
          </button>
        </div>

        <!-- Message -->
        <div class="mt-4" th:replace="~{message :: messagebox}"></div>

        <!-- Contacts Table -->
        <div class="overflow-x-auto mt-6">

          <table
            th:if="${pageContact.totalElements > 0}"
            class="w-full border text-sm text-left"
            id="contact-table"
          >
            <thead class="bg-gray-100">
              <tr>
                <th class="px-4 py-3">Name</th>
                <th class="px-4 py-3">Phone</th>
                <th class="px-4 py-3">Links</th>
                <th class="px-4 py-3">Actions</th>
              </tr>
            </thead>

            <tbody>
              <tr
                th:each="c : ${pageContact.content}"
                class="border-b hover:bg-gray-50"
              >
                <td class="px-4 py-3 flex items-center gap-3">
                  <img
                    th:src="${c.picture}"
                    onerror="this.src='https://static-00.iconduck.com/assets.00/profile-default-icon-2048x2045-u3j7s5nj.png'"
                    class="w-10 h-10 rounded-full"
                  />
                  <div>
                    <div class="font-semibold" th:text="${c.name}"></div>
                    <div class="text-gray-500" th:text="${c.email}"></div>
                  </div>
                </td>

                <td class="px-4 py-3" th:text="${c.phoneNumber}"></td>

                <td class="px-4 py-3 space-x-3">
                  <a th:href="${c.websiteLink}" target="_blank">
                    <i class="fa-solid fa-link"></i>
                  </a>
                  <a th:href="${c.linkedInLink}" target="_blank">
                    <i class="fa-brands fa-linkedin"></i>
                  </a>
                </td>

                <td class="px-4 py-3 flex gap-4 items-center">

                  <!-- ✅ DELETE CONTACT -->
                  <form
                    th:action="@{'/user/contacts/delete/' + ${c.id}}"
                    method="post"
                    onsubmit="return confirm('Are you sure you want to delete this contact?')"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button
                      type="submit"
                      class="text-red-600 hover:text-red-800"
                      title="Delete Contact"
                    >
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </form>

                  <!-- UPDATE CONTACT -->
                  <a
                    th:href="@{'/user/contacts/view/' + ${c.id}}"
                    class="text-blue-600 hover:text-blue-800"
                    title="Edit Contact"
                  >
                    <i class="fa-solid fa-pen"></i>
                  </a>

                </td>
              </tr>
            </tbody>
          </table>

          <!-- No Contacts -->
          <h2
            th:if="${pageContact.totalElements == 0}"
            class="text-center text-xl mt-8"
          >
            No contacts found
          </h2>
        </div>

        <!-- Pagination -->
        <div
          th:if="${pageContact.totalPages > 1}"
          class="text-center mt-6"
        >
          <a
            th:each="i : ${#numbers.sequence(0, pageContact.totalPages - 1)}"
            th:href="@{'/user/contacts?page=' + ${i} + '&size=' + ${pageSize}}"
            th:text="${i + 1}"
            class="px-3 py-1 border mx-1"
            th:classappend="${i == pageContact.number ? 'bg-blue-500 text-white' : ''}"
          ></a>
        </div>

      </div>
    </div>

    <!-- Export Script -->
    <script src="https://cdn.jsdelivr.net/npm/@linways/table-to-excel@1.0.4/dist/tableToExcel.min.js"></script>
    <script>
      function exportData() {
        TableToExcel.convert(document.getElementById("contact-table"), {
          name: "contacts.xlsx",
        });
      }
    </script>
  </body>
</html>
